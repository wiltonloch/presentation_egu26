<svg width="1600" height="500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label { font: 50px sans-serif; fill: #EEEEEE; dominant-baseline: middle; }
    .value { font: 40px sans-serif; fill: #EEEEEE; dominant-baseline: middle; }
  </style>

  <!-- Bars -->
  <!-- Scale factor: 10 -> 1000px -->

